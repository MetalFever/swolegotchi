<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swole-gotchi: Phase 1</title>
    <style>
        /* Mobile-first Reset & App Layout */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none; /* Prevents text highlighting on rapid tapping */
            -webkit-user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 850px;
            background-color: #1a1a1a;
            border: 4px solid #ccff00; /* Neon Gym/Retro color theme */
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            padding: 16px;
            position: relative;
        }

        /* Screen Header & Game Over */
        header {
            text-align: center;
            padding-bottom: 12px;
            border-bottom: 2px solid #333;
        }

        h1 {
            color: #ccff00;
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Avatar / Display Panel */
        .display-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #0a0a0a;
            border-radius: 8px;
            margin: 16px 0;
            border: 2px solid #262626;
            position: relative;
        }

        .avatar {
            font-size: 5rem;
            margin-bottom: 12px;
            transition: transform 0.2s ease;
        }

        .status-text {
            font-size: 1.1rem;
            font-weight: bold;
            color: #ffffff;
            text-align: center;
        }

        /* Stats Panel Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }

        .stat-box {
            background-color: #222;
            padding: 10px;
            border-radius: 6px;
            border-left: 4px solid #ccff00;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
        }

        /* Interaction Panel (Buttons) */
        .controls-panel {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .action-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            background-color: #ccff00;
            color: #121212;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px #99cc00;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 0px #99cc00;
        }

        button:disabled {
            background-color: #444;
            color: #777;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        button.sleep-btn {
            background-color: #00e5ff;
            color: #121212;
            box-shadow: 0 4px #00a8cc;
        }
        button.sleep-btn:active {
            box-shadow: 0 0px #00a8cc;
        }
        button.sleep-btn.sleeping {
            background-color: #ff0055;
            color: white;
            box-shadow: 0 4px #b3003b;
        }

        /* Death Overlay Screen */
        .death-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }

        .death-screen h2 {
            color: #ff0055;
            font-size: 2rem;
            margin-bottom: 16px;
        }

        .death-screen p {
            margin-bottom: 24px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Death Screen Overlay -->
        <div class="death-screen" id="deathScreen">
            <h2>GAME OVER</h2>
            <p id="deathReason">Your bodybuilder catabolized into absolute nothingness.</p>
            <button onclick="resetGame()">Try Again</button>
        </div>

        <header>
            <h1>Swole-gotchi</h1>
        </header>

        <!-- Dynamic Avatar Display -->
        <div class="display-panel">
            <div class="avatar" id="avatar">💪</div>
            <div class="status-text" id="statusText">Feeling Fine</div>
        </div>

        <!-- Real-Time Metrics -->
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-label">Muscle Mass</div>
                <div class="stat-value" id="statMuscle">10</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Cash</div>
                <div class="stat-value" id="statCash">$10</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Fullness</div>
                <div class="stat-value" id="statFullness">100/100</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Energy</div>
                <div class="stat-value" id="statEnergy">100/100</div>
            </div>
        </div>

        <!-- Action Grid -->
        <div class="controls-panel">
            <div class="action-row">
                <button id="btnTrain" onclick="trainHard()">🏋️ Lift Heavy</button>
                <button id="btnFeed" onclick="feedMeal()">🍗 Eat Clean</button>
            </div>
            <button id="btnSleep" class="sleep-btn" onclick="toggleSleep()">💤 Go to Sleep</button>
        </div>
    </div>

    <script>
        // Game State Variables
        let state = {
            muscle: 10,
            cash: 10,
            fullness: 100,
            energy: 100,
            isSleeping: false,
            isDead: false,
            starvationTimer: 0
        };

        // Core Configuration Constants
        const LIMITS = { maxFullness: 100, maxEnergy: 100 };
        const DECAY_INTERVAL = 1000; // 1 second ticks

        // Game loop ticker variables
        let gameLoopTicker;

        function initGame() {
            state = {
                muscle: 10,
                cash: 10,
                fullness: 100,
                energy: 100,
                isSleeping: false,
                isDead: false,
                starvationTimer: 0
            };
            document.getElementById('deathScreen').style.display = 'none';
            updateUI();
            
            if (gameLoopTicker) clearInterval(gameLoopTicker);
            gameLoopTicker = setInterval(gameLoop, DECAY_INTERVAL);
        }

        // Main Simulation Tick (Runs every second)
        function gameLoop() {
            if (state.isDead) return;

            if (state.isSleeping) {
                // Sleep mechanics: Recover energy rapidly, slower hunger decay
                state.energy = Math.min(LIMITS.maxEnergy, state.energy + 8);
                state.fullness = Math.max(0, state.fullness - 0.5);
            } else {
                // Standard real-time active decay variables
                state.fullness = Math.max(0, state.fullness - 2);
                state.energy = Math.max(0, state.energy - 1);
            }

            // Atrophy / Starvation System
            if (state.fullness <= 0) {
                state.muscle = Math.max(0, state.muscle - 1);
                state.starvationTimer++;
                
                // If starving continuously for 15 seconds, trigger death state
                if (state.starvationTimer >= 15) {
                    triggerDeath("Your lifter starved to death. Hard to make gains when you don't eat.");
                }
            } else {
                state.starvationTimer = 0;
            }

            updateUI();
        }

        // Actions Panels Logic
        function trainHard() {
            if (state.energy < 20 || state.fullness < 15) return;
            
            state.muscle += 5;
            state.energy = Math.max(0, state.energy - 20);
            state.fullness = Math.max(0, state.fullness - 15);
            state.cash += 5; // Simulating small crowd donations/payouts for lifting heavy
            
            animateAvatar();
            updateUI();
        }

        function feedMeal() {
            if (state.cash < 5) return;
            
            state.cash -= 5;
            state.fullness = Math.min(LIMITS.maxFullness, state.fullness + 30);
            updateUI();
        }

        function toggleSleep() {
            state.isSleeping = !state.isSleeping;
            const sleepBtn = document.getElementById('btnSleep');
            
            if (state.isSleeping) {
                sleepBtn.innerText = "☀️ Wake Up";
                sleepBtn.classList.add('sleeping');
            } else {
                sleepBtn.innerText = "💤 Go to Sleep";
                sleepBtn.classList.remove('sleeping');
            }
            updateUI();
        }

        // State Machine to Interface Updates
        function updateUI() {
            // Render basic stats integers
            document.getElementById('statMuscle').innerText = Math.floor(state.muscle);
            document.getElementById('statCash').innerText = `$${state.cash}`;
            document.getElementById('statFullness').innerText = `${Math.floor(state.fullness)}/${LIMITS.maxFullness}`;
            document.getElementById('statEnergy').innerText = `${Math.floor(state.energy)}/${LIMITS.maxEnergy}`;

            // Control Button Disable Interlocks
            document.getElementById('btnTrain').disabled = state.isSleeping || state.energy < 20 || state.fullness < 15;
            document.getElementById('btnFeed').disabled = state.isSleeping || state.cash < 5 || state.fullness >= LIMITS.maxFullness;

            // Compute dynamic expressions and updates
            const avatarEl = document.getElementById('avatar');
            const statusEl = document.getElementById('statusText');

            if (state.isSleeping) {
                avatarEl.innerText = "😴";
                statusEl.innerText = "Zzz... Recovering...";
                statusEl.style.color = "#00e5ff";
                return;
            }

            // Muscle Milestone Evolution (Visual Tiers)
            if (state.muscle < 10) {
                avatarEl.innerText = "🧍";
                statusEl.innerText = "Skinny atrophied frame. Needs food and iron.";
                statusEl.style.color = "#ff0055";
            } else if (state.muscle >= 10 && state.muscle < 50) {
                avatarEl.innerText = "💪";
                statusEl.innerText = "Gains are starting to show.";
                statusEl.style.color = "#ffffff";
            } else {
                avatarEl.innerText = "🏋️";
                statusEl.innerText = "Absolute Unit territory!";
                statusEl.style.color = "#ccff00";
            }

            // Mood/Status overrides based on contextual threat values
            if (state.fullness < 25) {
                statusEl.innerText = "⚠️ STARVING! Muscle is wasting away!";
                statusEl.style.color = "#ff0055";
            } else if (state.energy < 25) {
                statusEl.innerText = "Exhausted. Needs a nap.";
                statusEl.style.color = "#ffaa00";
            }
        }

        function animateAvatar() {
            const av = document.getElementById('avatar');
            av.style.transform = 'scale(1.3)';
            setTimeout(() => { av.style.transform = 'scale(1)'; }, 150);
        }

        function triggerDeath(reason) {
            state.isDead = true;
            clearInterval(gameLoopTicker);
            document.getElementById('deathReason').innerText = reason;
            document.getElementById('deathScreen').style.display = 'flex';
        }

        function resetGame() {
            initGame();
        }

        // Kick off game on setup window mount load
        window.onload = initGame;
    </script>
</body>
</html>
